<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — EventPlanner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="container">
    <div class="form-container">
      <div class="logo">
        <h1>EventPlanner</h1>
        <p class="text-muted">Войдите, чтобы управлять своими мероприятиями</p>
      </div>

      <form id="loginForm" novalidate>
        <!-- Email -->
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            class="form-control"
            id="email"
            placeholder="example@mail.com"
            required
          />
          <div class="invalid-feedback">Пожалуйста, введите корректный email.</div>
        </div>

        <!-- Пароль -->
        <div class="mb-3">
          <label for="password" class="form-label">Пароль</label>
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Ваш пароль"
            required
          />
          <div class="invalid-feedback">Пароль обязателен.</div>
        </div>

        <!-- Ошибка аутентификации -->
        <div id="authError" class="alert alert-danger">
          Неверный email или пароль.
        </div>

        <!-- Кнопка входа -->
        <div class="d-grid">
          <button class="btn btn-primary btn-lg" type="submit">
            Войти
          </button>
        </div>

        <!-- Ссылка на регистрацию -->
        <div class="text-center mt-3">
          <p class="mb-0">
            Нет аккаунта? <a href="register.html" class="text-decoration-none">Зарегистрироваться</a>
          </p>
        </div>
      </form>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    (function () {
      'use strict';

      const form = document.getElementById('loginForm');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const authError = document.getElementById('authError');

      // Поиск пользователя по email и паролю
      function findUser(email, password) {
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        return users.find(user => user.email === email && user.password === password);
      }

      // Обработка входа
      form.addEventListener('submit', function (event) {
        event.preventDefault();

        // Скрываем ошибку
        authError.style.display = 'none';

        // Валидация формы
        if (!form.checkValidity()) {
          form.classList.add('was-validated');
          return;
        }

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        const user = findUser(email, password);

        if (user) {
          // Инициализируем RSVP, если его нет
          if (!user.rsvp) user.rsvp = {};
          localStorage.setItem('currentUser', JSON.stringify(user));
          window.location.href = 'index.html';
        } else {
          // Показываем ошибку
          authError.style.display = 'block';
        }
      });
    })();
  </script>
</body>
</html>
