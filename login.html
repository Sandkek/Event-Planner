<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — EventPlanner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="container">
    <div class="form-container">
      <div class="logo">
        <h1>EventPlanner</h1>
        <p class="text-muted">Войдите, чтобы управлять своими мероприятиями</p>
      </div>

      <form id="loginForm" novalidate>
        <!-- Email -->
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            class="form-control"
            id="email"
            placeholder="example@mail.com"
            required
          />
          <div class="invalid-feedback">Пожалуйста, введите корректный email.</div>
        </div>

        <!-- Пароль -->
        <div class="mb-3">
          <label for="password" class="form-label">Пароль</label>
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Ваш пароль"
            required
          />
          <div class="invalid-feedback">Пароль обязателен.</div>
        </div>

        <!-- Ошибка аутентификации -->
        <div id="authError" class="alert alert-danger">
          Неверный email или пароль.
        </div>

        <!-- Кнопка входа -->
        <div class="d-grid">
          <button class="btn btn-primary btn-lg" type="submit">
            Войти
          </button>
        </div>

        <!-- Ссылка на регистрацию -->
        <div class="text-center mt-3">
          <p class="mb-0">
            Нет аккаунта? <a href="register.html" class="text-decoration-none">Зарегистрироваться</a>
          </p>
        </div>
      </form>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module" src="js/pages/login.js"></script>
</body>
</html>
