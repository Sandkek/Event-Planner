<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Календарь событий — EventPlanner</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/calendar.css') }}">

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/main.min.css" rel="stylesheet" />
</head>
<body>
  <div class="container py-4">
    <div class="calendar-page-header mb-4">
      <div>
        <h1 class="mb-1">Календарь событий</h1>
        <p class="text-muted mb-0">Просматривайте запланированные мероприятия по датам</p>
      </div>
      <div class="d-flex gap-2">
        <a href="/" class="btn btn-outline-primary">Каталог</a>
        <a href="/profile" class="btn btn-primary">Профиль</a>
      </div>
    </div>

    <div class="calendar-card mb-3">
      <div class="calendar-filters">
        <div>
          <label for="ownershipFilter" class="form-label">Показывать</label>
          <select id="ownershipFilter" class="form-select">
            <option value="all">Все мероприятия</option>
            <option value="my">Мои мероприятия</option>
            <option value="joined">Я записан</option>
          </select>
        </div>

        <div>
          <label for="categoryFilter" class="form-label">Категория</label>
          <select id="categoryFilter" class="form-select">
            <option value="">Все категории</option>
            <option value="tech">Технологии</option>
            <option value="health">Здоровье и спорт</option>
            <option value="culture">Культура и искусство</option>
            <option value="business">Бизнес и карьера</option>
            <option value="hobby">Хобби и творчество</option>
          </select>
        </div>

        <div class="calendar-filter-actions">
          <button id="resetCalendarFiltersBtn" class="btn btn-outline-secondary" type="button">
            Сбросить
          </button>
        </div>
      </div>
    </div>

    <div class="calendar-card">
      <div id="calendar"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.20/locales-all.global.min.js"></script>

  <script type="module" src="{{ url_for('static', filename='js/pages/calendar.js') }}"></script>
</body>
</html>
