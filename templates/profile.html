<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мой профиль — EventPlanner</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  
  <!-- Стили -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/profile.css') }}">
</head>
<body>
  <div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
      <div>
        <h1 id="profileName">Мой профиль</h1>
        <p class="text-muted mb-0">Управляйте своими мероприятиями и участием</p>
      </div>
      <a href="/calendar" class="btn btn-outline-primary">Открыть календарь</a>
    </div>

    <div id="profileRemindersContainer" class="mb-4"></div>

    <!-- Вкладки -->
    <ul class="nav nav-tabs" id="profileTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="my-events-tab" data-bs-toggle="tab" data-bs-target="#my-events" type="button">
          Мои мероприятия
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="joined-events-tab" data-bs-toggle="tab" data-bs-target="#joined-events" type="button">
          Записан(а)
        </button>
      </li>
    </ul>

    <!-- Содержимое вкладок -->
    <div class="tab-content mt-4" id="profileTabContent">
      <!-- Мои мероприятия -->
      <div class="tab-pane fade show active" id="my-events" role="tabpanel">
        <div id="myEventsContainer" class="events-grid">
          <!-- События будут здесь -->
        </div>
      </div>

      <!-- Записан(а) -->
      <div class="tab-pane fade" id="joined-events" role="tabpanel">
        <div id="joinedEventsContainer" class="events-grid">
          <!-- События будут здесь -->
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="{{ url_for('static', filename='js/pages/profile.js') }}"></script>
</body>
</html>
