<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventPlanner — Найдите своё сообщество</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
</head>

<body>
  <section class="hero">
    <div class="container">
      <h1>Найдите мероприятия по интересам рядом с вами</h1>

      <div class="search-container">
        <input
          type="text"
          id="searchInput"
          class="form-control"
          placeholder="Поиск мероприятий..."
        />
      </div>

      <div id="createEventContainer" class="mt-3">
        <a href="/create-event" class="btn btn-light">
          + Создать мероприятие
        </a>
      </div>
    </div>
  </section>

  <section class="container mt-4">
    <div id="remindersContainer"></div>
  </section>

  <main class="container mt-4">
    <div id="eventsContainer" class="events-grid">
      <!-- События будут добавлены через JS -->
    </div>
  </main>
  
  <main class="container mt-4">
    <div id="eventsContainer" class="events-grid"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script
    type="module"
    src="{{ url_for('static', filename='js/pages/main.js') }}"
  ></script>
</body>
</html>
