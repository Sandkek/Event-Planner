<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Настройки — EventPlanner</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/settings.css') }}">
</head>
<body>
  <div class="container py-4">
    <div class="settings-header mb-4">
      <div>
        <h1 class="mb-1">Настройки</h1>
        <p class="text-muted mb-0">Управляйте профилем и параметрами уведомлений</p>
      </div>
      <a href="/profile" class="btn btn-outline-primary">← Назад в профиль</a>
    </div>

    <div class="row g-4">
      <div class="col-lg-6">
        <div class="settings-card">
          <h3 class="settings-card-title">Профиль</h3>

          <form id="profileSettingsForm" novalidate>
            <div class="mb-3">
              <label for="fullName" class="form-label">Полное имя</label>
              <input type="text" class="form-control" id="fullName" required minlength="2" />
              <div class="invalid-feedback">Введите имя.</div>
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" required />
              <div class="invalid-feedback">Введите корректный email.</div>
              <div id="emailExistsError" class="invalid-feedback d-none">
                Пользователь с таким email уже существует.
              </div>
            </div>

            <button type="submit" class="btn btn-primary">Сохранить профиль</button>
          </form>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="settings-card">
          <h3 class="settings-card-title">Смена пароля</h3>

          <form id="passwordSettingsForm" novalidate>
            <div class="mb-3">
              <label for="currentPassword" class="form-label">Текущий пароль</label>
              <input type="password" class="form-control" id="currentPassword" required />
              <div class="invalid-feedback">Введите текущий пароль.</div>
            </div>

            <div class="mb-3">
              <label for="newPassword" class="form-label">Новый пароль</label>
              <input type="password" class="form-control" id="newPassword" minlength="6" required />
              <div class="invalid-feedback">Новый пароль должен содержать минимум 6 символов.</div>
            </div>

            <div class="mb-3">
              <label for="confirmNewPassword" class="form-label">Подтвердите новый пароль</label>
              <input type="password" class="form-control" id="confirmNewPassword" required />
              <div class="invalid-feedback">Пароли должны совпадать.</div>
            </div>

            <button type="submit" class="btn btn-primary">Обновить пароль</button>
          </form>
        </div>
      </div>

      <div class="col-12">
        <div class="settings-card">
          <h3 class="settings-card-title">Уведомления</h3>

          <form id="notificationSettingsForm">
            <div class="form-check form-switch mb-3">
              <input class="form-check-input" type="checkbox" id="toastNotificationsEnabled" />
              <label class="form-check-label" for="toastNotificationsEnabled">
                Показывать toast-уведомления в интерфейсе
              </label>
            </div>

            <div class="form-check form-switch mb-3">
              <input class="form-check-input" type="checkbox" id="eventRemindersEnabled" />
              <label class="form-check-label" for="eventRemindersEnabled">
                Показывать напоминания о ближайших мероприятиях
              </label>
            </div>

            <button type="submit" class="btn btn-primary">Сохранить настройки уведомлений</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="{{ url_for('static', filename='js/pages/settings.js') }}"></script>
</body>
</html>
