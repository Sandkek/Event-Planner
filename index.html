<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventPlanner — Найдите своё сообщество</title>

  <!-- Bootstrap 5 CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Стили главной страницы -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <!-- Герой -->
  <section class="hero">
    <div class="container">
      <h1>Найдите мероприятия по интересам рядом с вами</h1>
      <p>Присоединяйтесь к тысячам людей, которые делятся знаниями, увлечениями и идеями.</p>
      <div class="search-container">
        <input
          type="text"
          id="searchInput"
          class="form-control"
          placeholder="Поиск мероприятий, тем, мест..."
        />
      </div>

      <div id="createEventContainer" class="mt-3"></div>
    </div>
  </section>

  <!-- Фильтры -->
  <div class="container mt-3">
    <div class="d-flex flex-wrap gap-2 justify-content-center" style="max-width: 600px; margin: 0 auto;">
      <select id="categoryFilter" class="form-select" style="flex: 1; min-width: 160px;">
        <option value="">Все категории</option>
        <option value="tech">Технологии</option>
        <option value="health">Здоровье</option>
        <option value="culture">Культура</option>
        <option value="business">Бизнес</option>
        <option value="hobby">Хобби</option>
      </select>

      <select id="dateFilter" class="form-select" style="flex: 1; min-width: 160px;">
        <option value="">Любое время</option>
        <option value="today">Сегодня</option>
        <option value="week">На этой неделе</option>
        <option value="month">В этом месяце</option>
      </select>
    </div>
  </div>

  <section class="container mt-4">
    <div id="remindersContainer"></div>
  </section>

  <!-- Список мероприятий -->
  <main class="container mt-4">
    <div id="eventsContainer" class="events-grid">
      <!-- События будут добавлены через JS -->
    </div>
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Логика главной страницы -->
  <script type="module" src="js/pages/main.js"></script>
</body>
</html>
