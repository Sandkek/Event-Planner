<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация — EventPlanner</title>

  <!-- Bootstrap 5 CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  
  <!-- Внешний CSS -->
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="container">
    <div class="form-container">
      <div class="logo">
        <h1>EventPlanner</h1>
        <p class="text-muted">Создавайте и организуйте мероприятия вместе</p>
      </div>

      <form id="registerForm" novalidate>
        <!-- Имя -->
        <div class="mb-3">
          <label for="fullName" class="form-label">Полное имя</label>
          <input
            type="text"
            class="form-control"
            id="fullName"
            placeholder="Иван Петров"
            required
          />
          <div class="invalid-feedback">Пожалуйста, укажите ваше имя.</div>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            class="form-control"
            id="email"
            placeholder="example@mail.com"
            required
          />
          <div class="invalid-feedback">Пожалуйста, введите корректный email.</div>
          <div id="emailExistsError" class="invalid-feedback d-none">
            Пользователь с таким email уже существует.
          </div>
        </div>

        <!-- Пароль -->
        <div class="mb-3">
          <label for="password" class="form-label">Пароль</label>
          <input
            type="password"
            class="form-control"
            id="password"
            minlength="6"
            placeholder="Не менее 6 символов"
            required
          />
          <div class="invalid-feedback">
            Пароль должен содержать минимум 6 символов.
          </div>
        </div>

        <!-- Подтверждение пароля -->
        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Подтвердите пароль</label>
          <input
            type="password"
            class="form-control"
            id="confirmPassword"
            placeholder="Повторите пароль"
            required
          />
          <div class="invalid-feedback">Пароли должны совпадать.</div>
        </div>

        <!-- Кнопка отправки -->
        <div class="d-grid">
          <button class="btn btn-primary btn-lg" type="submit">
            Зарегистрироваться
          </button>
        </div>

        <!-- Ссылка на вход -->
        <div class="text-center mt-3">
          <p class="mb-0">
            Уже есть аккаунт? <a href="login.html" class="text-decoration-none">Войти</a>
          </p>
        </div>
      </form>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    (function () {
      'use strict';

      const form = document.getElementById('registerForm');
      const emailInput = document.getElementById('email');
      const emailExistsError = document.getElementById('emailExistsError');

      // Проверка совпадения паролей
      const password = document.getElementById('password');
      const confirmPassword = document.getElementById('confirmPassword');

      confirmPassword.addEventListener('input', () => {
        if (password.value !== confirmPassword.value) {
          confirmPassword.setCustomValidity('Пароли не совпадают.');
        } else {
          confirmPassword.setCustomValidity('');
        }
      });

      // Проверка уникальности email
      function isEmailRegistered(email) {
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        return users.some(user => user.email === email);
      }

      // Сохранение пользователя
      function saveUser(fullName, email, password) {
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        users.push({ fullName, email, password });
        localStorage.setItem('users', JSON.stringify(users));
        
        // Инициализируем currentUser с пустым RSVP
        localStorage.setItem('currentUser', JSON.stringify({ 
          fullName, 
          email, 
          rsvp: {} 
        }));
      }

      // Обработка отправки формы
      form.addEventListener('submit', function (event) {
        event.preventDefault();

        // Сброс ошибки уникальности email
        emailExistsError.classList.add('d-none');
        emailInput.classList.remove('is-invalid');

        // Стандартная валидация Bootstrap
        if (!form.checkValidity()) {
          form.classList.add('was-validated');
          return;
        }

        const email = emailInput.value.trim();
        if (isEmailRegistered(email)) {
          emailInput.classList.add('is-invalid');
          emailExistsError.classList.remove('d-none');
          return;
        }

        // Сохраняем данные
        saveUser(
          document.getElementById('fullName').value.trim(),
          email,
          password.value
        );

        // Перенаправляем на календарь
        window.location.href = 'index.html';
      });
    })();
  </script>
</body>
</html>
