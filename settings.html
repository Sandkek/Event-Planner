<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Настройки — EventPlanner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />

  <script src="js/navbar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof loadNavbar === 'function') {
        loadNavbar();
      }
    });
  </script>  
</head>
<body>
  <div class="container mt-5">
    <h2>Настройки</h2>
    <p class="text-muted">Здесь скоро появятся настройки уведомлений и профиля.</p>
    <a href="profile.html" class="btn btn-outline-primary">← Назад в профиль</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function initNavbar() {
      const authNav = document.getElementById('authNav');
      const user = JSON.parse(localStorage.getItem('currentUser'));
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      authNav.innerHTML = `
        <div class="dropdown">
          <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle" data-bs-toggle="dropdown">
            <span class="user-info me-2">${user.fullName}</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="profile.html">Профиль</a></li>
            <li><a class="dropdown-item" href="settings.html">Настройки</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="login.html" onclick="localStorage.removeItem('currentUser')">Выйти</a></li>
          </ul>
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', initNavbar);
  </script>
</body>
</html>
