<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">Мероприятие — EventPlanner</title>

  <!-- Bootstrap 5 CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://unpkg.com/maplibre-gl@5.23.0/dist/maplibre-gl.css"
  />

  <!-- Стили страницы -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/event.css" />
</head>
<body>
  <!-- Навбар будет загружен через JS -->

  <!-- Заголовок мероприятия -->
  <header class="event-header">
    <div class="container">
      <h1 id="eventTitle" class="event-title">Загрузка...</h1>
      <div class="event-meta">
        <span id="eventDate">—</span>
        <span id="eventLocation">—</span>
        <span>Организатор: <span id="eventOrganizer">—</span></span>
      </div>
    </div>
  </header>

  <!-- Изображение мероприятия -->
  <div class="event-image-container" style="height: 300px; overflow: hidden; margin-bottom: 2rem;">
    <!-- Изображение будет вставлено через JS -->
  </div>

  <div class="event-content" id="eventContent">
    <!-- Описание -->
    <div class="event-description">
      <h2>О мероприятии</h2>
      <p id="eventDescription">Загрузка...</p>
    </div>

    <!-- Место -->
    <h2>Место проведения</h2>
    <div id="mapPlaceholder" class="mb-3"></div>
    <div id="eventMap"></div>

    <!-- RSVP -->
    <h2>Участвуете?</h2>
    <div class="rsvp-buttons">
      <button class="rsvp-btn going" data-status="going">Пойду</button>
      <button class="rsvp-btn interested" data-status="interested">Может быть</button>
      <button class="rsvp-btn not-going" data-status="not-going">Не пойду</button>
    </div>

    <!-- Участники -->
    <div class="attendees-section">
      <h3>Участники (<span id="attendeesCount">0</span>)</h3>
      <div id="attendeesList" class="attendees-list">
        <!-- Список участников -->
      </div>
    </div>

    <!-- Кнопки управления -->
    <div id="eventActions" class="mt-4"></div>
    
    <!-- Приглашения -->
    <div id="inviteSection" class="mt-3"></div>
    <div id="inviteNotice" class="mt-3"></div>

    <!-- Вкладки -->
    <ul class="nav nav-tabs" id="eventTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button
          class="nav-link active"
          id="discussion-tab"
          data-bs-toggle="tab"
          data-bs-target="#discussion"
          type="button"
          role="tab"
          aria-controls="discussion"
          aria-selected="true"
        >
          Обсуждение
        </button>
      </li>

      <li class="nav-item" role="presentation">
        <button
          class="nav-link"
          id="polls-tab"
          data-bs-toggle="tab"
          data-bs-target="#polls"
          type="button"
          role="tab"
          aria-controls="polls"
          aria-selected="false"
        >
          Опросы
        </button>
      </li>
    </ul>

    <div class="tab-content" id="eventTabContent">
      <!-- Вкладка обсуждения -->
      <div
        class="tab-pane fade show active"
        id="discussion"
        role="tabpanel"
        aria-labelledby="discussion-tab"
        tabindex="0"
      >
        <div class="chat-messages" id="chatMessages">
          <!-- Сообщения будут здесь -->
        </div>

        <div class="chat-input mt-3">
          <div class="input-group">
            <input
              type="text"
              class="form-control"
              id="chatInput"
              placeholder="Напишите сообщение..."
              maxlength="280"
            >
            <button class="btn btn-primary" id="sendChatBtn" type="button">
              Отправить
            </button>
          </div>
          <small class="text-muted mt-1 d-block">Только для участников мероприятия</small>
        </div>
      </div>

      <!-- Вкладка опросов -->
      <div
        class="tab-pane fade"
        id="polls"
        role="tabpanel"
        aria-labelledby="polls-tab"
        tabindex="0"
      >
        <div class="polls-section mt-3">
          <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
            <h3 class="mb-0">Голосования</h3>
            <button class="btn btn-outline-primary btn-sm" id="showPollFormBtn" type="button">
              Создать опрос
            </button>
          </div>

          <div id="pollFormContainer" class="card mb-3" style="display: none;">
            <div class="card-body">
              <h5 class="card-title">Новый опрос</h5>

              <div class="mb-3">
                <label for="pollTitle" class="form-label">Название опроса</label>
                <input
                  type="text"
                  id="pollTitle"
                  class="form-control"
                  placeholder="Например: Выберите удобное время"
                >
              </div>

              <div class="mb-3">
                <label for="pollType" class="form-label">Тип</label>
                <select id="pollType" class="form-select">
                  <option value="custom">Обычный опрос</option>
                  <option value="time">Выбор времени</option>
                  <option value="location">Выбор места</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label">Варианты</label>
                <div id="pollOptionsPreview"></div>
                <button class="btn btn-outline-secondary btn-sm mt-2" id="addPollOptionBtn" type="button">
                  + Добавить вариант
                </button>
              </div>

              <div class="d-flex gap-2">
                <button class="btn btn-primary" id="createPollBtn" type="button">Создать</button>
                <button class="btn btn-outline-secondary" id="cancelPollBtn" type="button">Отмена</button>
              </div>
            </div>
          </div>

          <div id="pollsContainer">
            <!-- Опросы будут здесь -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="https://unpkg.com/maplibre-gl@5.23.0/dist/maplibre-gl.js"></script>

  <!-- Логика страницы -->
  <script type="module" src="js/pages/event.js"></script>
</body>
</html>
