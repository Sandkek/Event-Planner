<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">Мероприятие — EventPlanner</title>

  <!-- Bootstrap 5 CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Стили страницы -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/event.css" />

  <script src="js/navbar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof loadNavbar === 'function') {
        loadNavbar();
      }
    });
  </script>  
</head>
<body>
  <!-- Заголовок мероприятия -->
  <header class="event-header">
    <div class="container">
      <h1 id="eventTitle" class="event-title">Загрузка...</h1>
      <div class="event-meta">
        <span id="eventDate">—</span>
        <span id="eventLocation">—</span>
        <span>Организатор: <span id="eventOrganizer">—</span></span>
      </div>
    </div>
  </header>

  <!-- Изображение мероприятия -->
  <div class="event-image-container" style="height: 300px; overflow: hidden; margin-bottom: 2rem;">
    <!-- Изображение будет вставлено через JS -->
  </div>

  <div class="event-content" id="eventContent">
    <!-- Описание -->
    <div class="event-description">
      <h2>О мероприятии</h2>
      <p id="eventDescription">Загрузка...</p>
    </div>

    <!-- Место -->
    <h2>Место проведения</h2>
    <div id="mapPlaceholder"></div>

    <!-- RSVP -->
    <h2>Участвуете?</h2>
    <div class="rsvp-buttons">
      <button class="rsvp-btn going" data-status="going">Пойду</button>
      <button class="rsvp-btn interested" data-status="interested">Может быть</button>
      <button class="rsvp-btn not-going" data-status="not-going">Не пойду</button>
    </div>

    <!-- Участники -->
    <div class="attendees-section">
      <h3>Участники (<span id="attendeesCount">0</span>)</h3>
      <div id="attendeesList" class="attendees-list">
        <!-- Аватарки будут здесь -->
      </div>
    </div>

    <!-- Кнопки управления (только для организатора) -->
    <div id="eventActions" class="mt-4"></div>

    <!-- Вкладки -->
    <ul class="nav nav-tabs" id="eventTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="discussion-tab" data-bs-toggle="tab" data-bs-target="#discussion" type="button">Обсуждение</button>
      </li>
    </ul>

    <div class="tab-content" id="eventTabContent">
      <div class="tab-pane fade show active" id="discussion" role="tabpanel">
        <div class="chat-messages" id="chatMessages">
          <!-- Сообщения будут здесь -->
        </div>
        
        <div class="chat-input mt-3">
          <div class="input-group">
            <input type="text" class="form-control" id="chatInput" placeholder="Напишите сообщение..." maxlength="280">
            <button class="btn btn-primary" id="sendChatBtn" type="button">Отправить</button>
          </div>
          <small class="text-muted mt-1 d-block">Только для участников мероприятия</small>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Логика страницы -->
  <script src="js/event.js"></script>
</body>
</html>
