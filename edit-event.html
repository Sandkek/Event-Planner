<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Редактировать мероприятие — EventPlanner</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  
  <!-- Стили -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/create-event.css" />

  <script src="js/navbar.js"></script>  
</head>
<body>
  <div class="container">
    <a href="javascript:history.back()" class="back-link">← Вернуться назад</a>

    <div class="form-container">
      <h1 class="page-title">Редактировать мероприятие</h1>

      <form id="editEventForm" novalidate enctype="multipart/form-data">
        <input type="hidden" id="eventId" />

        <div class="mb-3">
          <label for="title" class="form-label">Название *</label>
          <input type="text" class="form-control" id="title" required minlength="5" maxlength="100">
          <div class="invalid-feedback">Укажите название (минимум 5 символов)</div>
        </div>

        <div class="mb-3">
          <label for="description" class="form-label">Описание *</label>
          <textarea class="form-control" id="description" rows="4" required minlength="20"></textarea>
          <div class="invalid-feedback">Описание должно содержать минимум 20 символов</div>
        </div>

        <!-- Поле загрузки изображения -->
        <div class="mb-3">
          <label for="imageUpload" class="form-label">Фотография мероприятия (опционально)</label>
          <input type="file" class="form-control" id="imageUpload" accept="image/*">
          <div class="form-text">Поддерживаются JPG, PNG (макс. 2 МБ)</div>
          <div id="imagePreview" class="mt-2"></div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="date" class="form-label">Дата и время *</label>
            <input type="datetime-local" class="form-control" id="date" required>
            <div class="invalid-feedback">Укажите дату и время</div>
          </div>

          <div class="col-md-6 mb-3">
            <label for="location" class="form-label">Место проведения *</label>
            <input type="text" class="form-control" id="location" required>
            <div class="invalid-feedback">Укажите место проведения</div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="latitude" class="form-label">Широта (опционально)</label>
            <input
              type="number"
              class="form-control"
              id="latitude"
              step="any"
              min="-90"
              max="90"
              placeholder="Например: 55.7558"
            >
          </div>

          <div class="col-md-6 mb-3">
            <label for="longitude" class="form-label">Долгота (опционально)</label>
            <input
              type="number"
              class="form-control"
              id="longitude"
              step="any"
              min="-180"
              max="180"
              placeholder="Например: 37.6176"
            >
          </div>
        </div>

        <div class="mb-3">
          <label for="category" class="form-label">Категория *</label>
          <select class="form-select" id="category" required>
            <option value="">Выберите категорию</option>
            <option value="tech">Технологии</option>
            <option value="health">Здоровье и спорт</option>
            <option value="culture">Культура и искусство</option>
            <option value="business">Бизнес и карьера</option>
            <option value="hobby">Хобби и творчество</option>
          </select>
          <div class="invalid-feedback">Выберите категорию</div>
        </div>

        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
          <button type="button" class="btn btn-outline-danger" id="deleteEventBtn">Удалить</button>
          <button type="submit" class="btn btn-create">Сохранить изменения</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/pages/edit-event.js"></script>
</body>
</html>
